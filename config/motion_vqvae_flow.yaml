# data
data_base_dir: /large/naru/EgoHand/data
data_dir: ${data_base_dir}/ee4d/ee4d_motion_uniegomotion/uniegomotion/ee_train_joints_tips.pt
data_dir_eval: ${data_base_dir}/ee4d/ee4d_motion_uniegomotion/uniegomotion/ee_val_joints_tips.pt
pattern: "*.npy"

# precomputed cache (set use_cache: true to load from precomputed pt)
use_cache: true
cache_pt: ./data/preprocessed_motion_train.pt
cache_pt_eval: ./data/preprocessed_motion_val.pt

# frequently changed
use_root_loss: false
root_keep_idx: [0, 3]          # use_root_loss:false のときに学習するroot次元
base_idx: 15
hand_local: true
code_dim: 256
K: 1024
T: 21
body_tokens_per_t: 4
cond_type: "decoder_separate"

# eval
eval_every: 1
eval_num_save_samples: 5
eval_batch_size: 32
eval_vis_dir: ${save_dir}/eval
eval_save_vis_every: 100
eval_check: false

# system
seed: 0
device: cuda
num_workers: 18

# training
batch_size: 256
epochs: 3000
lr: 0.0002
min_lr: 0.000002
warmup_epochs: 50
wd: 0.000001
grad_clip: 1
log_every: 1
ckpt_every: 1000

# pretrained VQ-VAE (set path to load encoder/codebook from pretrained ckpt)
pretrained_vqvae: ./runs/vq/hand_local_True/base_15/T_21/trans_False/token_4/code_dim_256/K_1024/lr_0.0001/ckpt_best.pt    # e.g. ./runs/vq/.../ckpt_best.pt
freeze_encoder: true     # true: freeze encoder + codebook, train flow decoder only

# flowでは基本OFF推奨（必要なら sample時だけログする設定に）
joints_loss: false
joints_loss_weight: 5.0
joints_loss_on_sample: false   # ★追加：sample時だけ joints_loss を計算してログする

# model
ema_decay: 0.99
alpha_commit: 2

hand_tokens_per_t: ${body_tokens_per_t}
body_down: 1
hand_down: 1

enc_depth: 6
enc_heads: 8
enc_mlp_ratio: 4.0   # ★ "mlp_ratio" でも拾えるようにしてるならどっちでもOK
mlp_ratio: 4.0       # 既存互換のため残す

alpha_root: 5.0
alpha_body: 1.0
alpha_hand: 1.0

enc_type_B: "cnn"
enc_type_H: "cnn"
enc_use_attn_B: false
enc_use_attn_H: false
enc_use_pos: false
enc_post_mlp: false

# ===== flow only =====
decoder_mode: flow

# loss weights
lambda_flow: 1.0
lambda_entropy: 0.001
mask_input_dims: true     # ★重要：未学習次元が他に悪影響出すのを抑える

# sampling (train logging / eval)
log_sample_every: 200     # ★旧 log_recon_every の代わり
flow_sample_steps: 30
flow_solver: heun         # euler or heun
flow_sample_steps_eval: 10
flow_solver_eval: heun

# flow decoder capacity
flow_model_dim: 256       # あなたの code_dim / cnn_width に合わせて軽め
flow_depth: 8
flow_heads: 8
flow_mlp_ratio: 4.0
flow_drop: 0.0
flow_attn_drop: 0.0
flow_t_dim: 256
flow_use_x_pos: true
flow_use_rope: true

# cnn
cnn_width_B: 256
cnn_depth_B: 8
cnn_width_H: 256
cnn_depth_H: 8
cnn_dilation_max: 8
cnn_drop: 0.0

hand_in_dim: 480
body_in_dim: 263


# normalize
normalize: true
mean_path: ./preprocess/statistics/tips/mean.npy
std_path: ./preprocess/statistics/tips/std.npy

include_fingertips: true

name: flow/${cond_type}/hand_local_${hand_local}/base_${base_idx}/T_${T}/trans_${use_root_loss}/token_${body_tokens_per_t}/code_dim_${code_dim}/K_${K}/enc_pr_${freeze_encoder}/
save_dir: ./runs/${name}
project: h2vq_flow