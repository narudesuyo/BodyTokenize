# Mix2 (EE4D + A101) unconditional motion diffusion (DDPM + DDIM)
# Body(263) + Hand w/ fingertips + hand_root (498) = 761

# model
x_dim: 761
body_dim: 263
model_dim: 512
depth: 12
heads: 8
mlp_ratio: 4.0
drop: 0.0
attn_drop: 0.0
t_dim: 512
max_T: 256
diffusion_timesteps: 1000
diffusion_schedule: cosine
sample_steps: 50

# loss weights
alpha_root: 5.0
alpha_body: 1.0
alpha_hand: 10.0
joints_loss: true
alpha_joints: 5.0
alpha_joints_hand: 5.0
alpha_bone_length: 5.0

# prediction type & geometric losses
prediction_type: x0
velocity_loss: true
alpha_velocity: 1.0
foot_contact_loss: true
alpha_foot_contact: 1.0

# data (mix2 cache)
use_cache: true
cache_pt: ./data/mix2_train_cache_clip21_base15_handroot.pt
cache_pt_eval: ./data/mix2_val_cache_clip21_base15_handroot.pt
T: 21
base_idx: 15
use_root_loss: false
hand_local: true
hand_root: true
hand_root_dim: 9
include_fingertips: true

# normalize
normalize: true
mean_path: ./preprocess/statistics/tips/mean.npy
std_path: ./preprocess/statistics/tips/std.npy

# training
debug_max_samples: 0
batch_size: 512
epochs: 1000
lr: 2e-4
min_lr: 1e-6
warmup_epochs: 50
wd: 1e-6
grad_clip: 1.0
log_every: 1
ckpt_every: 200
eval_every: 10
sample_vis_every: 50
num_vis_samples: 4

# evaluation (noise→denoise MPJPE)
eval_noise_t: 200
eval_ddim_steps: 20
eval_max_batches: 10
eval_num_save_samples: 4
eval_vis_dir: ${save_dir}/eval
eval_save_vis_every: 50
eval_vis_balance_sources: true
eval_vis_sources: "ee4d,a101"
eval_vis_num_per_source: 1
eval_batch_size: 32

# system
seed: 0
device: cuda
num_workers: 2

name: mix2_diffusion_uncond/dim${model_dim}/depth${depth}/T${T}
save_dir: ./runs/${name}
project: motion_diffusion_mix2
